# Auto-search: letting the eval harness write the next prompt

I had hand-written four prompt variants (v1, v3-cot, v4-strict, v5-exemplars) and gotten Glimp's category accuracy from 9% to 59% on a 56-image labeled set. The next gain was clearly going to come from another small edit on top of v5. I did not want to keep being the source of those edits.

So `make eval-search`: a tiny tool that proposes `(prompt, decode-params)` cells, scores each on the same labeled set as the existing `eval-batch`, and emits a Pareto front + champion summary. ~600 lines of Swift, sibling to `GlimpEvalBatch`, no shared mutable state.

## Pieces

**1. Mutator library (~120 lines, `EvalShared/EvalSearch.swift`).** Six pure `(String) -> String?` transforms keyed by stable name:

- `drop-exemplar` — removes one `"label" — example.` line from v5.
- `shorten-exemplars` — strips the description tail, keeps only `"label"`.
- `reframe-as-cot` — prepends a one-line "silently identify subject, then respond" preamble.
- `add-strict-tone` — appends "JSON only. No markdown. Begin with `{`."
- `swap-rules-order` — moves the fallback rule to the top.
- `tighten-photo-rule` — inserts a one-line rule narrowing `"photo"` (the residual error mode v5 left behind).

Each returns `nil` when it can't make a meaningful change (e.g. `drop-exemplar` on a baseline that has no exemplars). The loop interprets `nil` as "no-op draw, redraw" so the budget tracks scored cells, not attempted ones.

**2. Sampler.** Seeded `SplitMix64` RNG (not `SystemRandomNumberGenerator` — `--seed` reproducibility is the spec). Each plan: chain length 1 or 2, no repeats inside a chain (applying `drop-exemplar` twice is one drop). Decode-params axis is wired but off in v1 — fixed at `t=0.1, mt=512` so signal stays attributable to prompt edits. Oversample by 6× to absorb chain dedupe + nil mutators.

**3. Cell ID.** Deterministic short string: `dropExemplar+addStrictTone__t10_mt512`. Not a UUID — I want to grep `search.md` for a winner's artifacts. Re-running with the same seed produces the same filenames.

**4. Scoring.** Loads the model once, reuses it across cells. Per cell: iterate images, classify, compute the same `EvalSummary` shape `eval-batch` already emits. Each cell writes its own JSON file mirroring the batch shape, so existing tooling (confusion-matrix renderer, leaderboard) reads search outputs without modification.

**5. Pareto front.** Two-axis: category accuracy ↑ × p50 latency ↓. A cell is dominated iff some other cell is no worse on both and strictly better on at least one. O(n²) is fine for n=12.

**6. Report.** One `search.md` at the run root: all cells sorted by category, the Pareto front, top-3 by category, confusion matrices for those three, plus the actual `--out` paths to the per-cell JSON.

## What I didn't build

- **Bandits or Bayesian.** Pure random for v1. The honest argument: 12 cells × 56 images × 9 s ≈ 1.7 h on Qwen3-VL-4B. Prove signal at this scale before adding cleverer samplers.
- **Multi-model.** Search holds the model fixed. Cross-model search means re-loading the VLM, which dwarfs everything else. If a winning chain exists, run it through `eval-batch` afterward.
- **Decode-param search.** Wired (`--search-decode`), off by default. v1 is "what does prompt-only get me?" not "what does the joint space look like?"
- **Continue from prior run.** Each run is hermetic. Caching adds operational complexity I don't need until budgets get bigger than one afternoon.

## What surprised me while building it

The `nil`-on-no-op contract is doing more work than I expected. Without it, four of six mutators would silently chain-collapse the input on the wrong baseline (`drop-exemplar` on `v1` would just return v1 unchanged) and burn search budget on identical scores. With it, every scored cell is guaranteed to differ from the baseline by *at least one applied transform*. That makes the Pareto front actually mean something.

The other surprise: I wrote ~70 lines of CLI arg parsing by hand. With hindsight, swift-argument-parser was probably the right call. But the hand-rolled version was 30 minutes and the dependency would have been an hour, so the trade was correct *for the size of the tool*.

## Run it

```
make eval-search ARGS="--budget 12 --seed 42"
```

Output lands in `runs/<ts>_search/`. The `search.md` at the root has the leaderboard and Pareto front. Any winning chain can be replayed via `applyMutatorChain(chain, to: baseline)` — that's why the chain names are persisted in the JSON, not just the final mutated text.

The point of all this is small. I just wanted the next "+19 pp" to find itself rather than waiting for me to think of it.
