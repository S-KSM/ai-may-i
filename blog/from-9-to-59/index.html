# From 9% to 59%: prompt iteration on a tiny VLM eval set

I've been building **Glimp**, a Mac app that points a vision-language model at a folder of old photo scans and renames + sorts them by what's in the frame. Date, category, caption, orientation. All on-device, all using `mlx-swift-examples`'s VLM runners on Apple Silicon.

After my first end-to-end run, the categorizations were so wrong that I had to stop and figure out where the error actually was: the model? the prompt? the harness? This is a writeup of what the eval loop showed.

**TL;DR:** on a 56-image hand-labeled set, four MLX-quantized VLMs went from a baseline of 9–31% category accuracy on a one-paragraph prompt up to 43–59% on a structurally near-identical prompt that just included one short example per category. The biggest single change was adding exemplars; chain-of-thought *hurt*; one of the four models was completely dead across every prompt I tried; and the eval loop itself surfaced two bugs in the app that would otherwise have shipped.

Numbers and methodology below. None of this is a research paper — n=56, single labeler, one labeling pass — but the deltas are big enough that they aren't noise.

## What I'm classifying

Glimp's prompt asks the VLM to return a single JSON object describing one image, with these fields:

```
{ "category", "sublabel", "caption", "date_guess",
  "ocr_text", "orientation", "confidence" }
```

`category` is the closed set of 13 labels: `photo, portrait, group, travel, event, card, letter, document, id, art, screenshot, receipt, other`. The other fields are open-ended.

The eval set: 56 images at `~/Downloads/AnnieScanTest`, hand-labeled by me into `<filename>.gt.json` sidecars. Mix of FastFoto fronts/backs, postcards, business cards, modern phone scans. Categories present: photo, portrait, group, travel, event, card, letter, other. (Not all 13 — those are just the ones in this set.)

The eval harness is a tiny Swift CLI that loads each (model, prompt) pair, runs every image through it, parses the JSON, computes:

- **Cat** — predicted category exact-match vs ground truth.
- **Orient** — predicted clockwise rotation (0/90/180/270) matches GT.
- **Cap kw** — fraction of ground-truth keywords that appear (case-insensitive substring) in the caption.
- **JSON OK** — model emitted parseable JSON on the first try.
- **p50 / p95 ms** — per-image inference latency.

`n` is the number of images for which the model returned parseable JSON, so denominators are over the parseable subset. A model that fails to emit JSON on the hard images doesn't get partial credit.

## The four models

All `mlx-community` 4-bit quants except where noted. Roughly ranked by size:

- **Qwen2-VL-2B-Instruct-4bit** — fastest (~3.7 s/image), smallest.
- **Qwen2.5-VL-3B-Instruct-4bit** — mid (~4.5 s/image).
- **Qwen3-VL-4B-Instruct-8bit** — current Glimp default (~9 s/image).
- **gemma-3-4b-it-qat-4bit** — slowest of the four (~11 s/image).

All on a single M-series Mac with shared unified memory, so latency numbers reflect a real laptop, not a server.

## The prompts I authored

### v1 — the original

A single paragraph schema description with the 13 categories listed inline. Tone: descriptive, not directive.

> You analyze a single image: photo, scan, document, or piece of mail. Return ONLY a JSON object on one line with these keys: …

### v3-cot — chain of thought

Explicit "think first, then emit JSON" framing.

> Step 1 (silent): briefly think about what the image shows, what category it belongs to, which way is up, and any visible text. Do NOT print this step.
>
> Step 2: emit ONE single-line JSON object …

### v4-strict — schema + fallback rules

Capitalized rules, explicit fallback to `"other"` if unsure, lowercase-only values.

> RESPOND WITH A SINGLE JSON OBJECT. NOTHING ELSE. NO PROSE.
>
> Schema (all keys REQUIRED, exact spelling, lower-case values where listed):
> { "category": one of "photo", "portrait", … . If unsure choose "other". DO NOT invent new values. DO NOT use synonyms. … }
>
> If you cannot satisfy the schema, still emit the JSON with "category":"other" and "confidence":0.1.

### v5-exemplars — v4 plus one short example per category

Same skeleton as v4-strict; the only change is each category gets a short anchor:

> "photo"     — casual snapshot, scene/object, no posed subject.
> "portrait"  — one person centered, e.g. class headshot.
> "group"     — two+ people posed, e.g. family lineup.
> "travel"    — landmark or trip scenery, e.g. foreign skyline.
> …

12-18 words per example. Total prompt is about 1.4× v4-strict.

## What the numbers say

Category accuracy by (model, prompt). **Bold** is the best cell.

| Model | v1 | v3-cot | v4-strict | **v5-exemplars** |
|---|---:|---:|---:|---:|
| **Qwen3-VL-4B-8bit** | 28% | 22% | 40% | **59%** |
| Qwen2-VL-2B-4bit | 9% | 14% | 23% | **43%** |
| gemma-3-4b-qat-4bit | 31% | 27% | 35% | 33% |
| Qwen2.5-VL-3B-4bit | 9% | 9% | 9% | 9% |

The single largest move is **v4-strict → v5-exemplars on Qwen3-VL-4B: 40% → 59% (+19 percentage points)**. Latency was identical to one decimal. Orientation accuracy stayed at 85%.

For Qwen2-VL-2B the same change is even bigger: 23% → 43% (+20 pp). The smaller model benefits *more* from being told what each label looks like.

## The five things this surfaced that I wouldn't have guessed

### 1. Chain-of-thought hurt category accuracy on the bigger model.

v3-cot ("silently think first, then emit JSON") moved Qwen3-VL-4B from 28% → 22% category vs the v1 baseline. A 6 pp regression. CoT only won captions on the smallest model (Qwen2-VL-2B caption keyword recall went 61% → 78%) — and that didn't translate to category, the metric I actually care about.

The framing here matters. "Think out loud, then answer" is the tutorial-canonical CoT instruction, but for closed-set classification it seems to give the model permission to wander into reasoning that then leaks into the JSON.

### 2. JSON validity is a misleading proxy.

Qwen2.5-VL-3B emitted **100% parseable JSON across all four prompts** (v1, v3-cot, v4-strict, v5-exemplars) and got **9% category accuracy in every one of them**. It produces well-formed JSON with the wrong values. The model has almost no signal from the image; it just confidently emits a degenerate distribution.

If I had a test that only checked "did the parser work?" I would have shipped Qwen2.5-VL-3B as a viable option. The eval loop catches what unit tests can't.

### 3. The exemplar that worked, worked exactly as designed.

The single biggest gain on Qwen3-VL came from disambiguating *portrait* vs *photo*. Before v5, `portrait→photo` was the model's most common confusion (7 images out of 16 portraits in the set, on v4-strict). After v5, that dropped to 2 out of 16. The line `"portrait" — one person centered, e.g. class headshot.` is doing real work.

What didn't work: `travel→photo` was 12 images on v4-strict and dropped only to 10 on v5. The model still isn't treating "obvious foreign landmark" as a travel signal. The v5 exemplar `"travel" — landmark or trip scenery, e.g. foreign skyline.` wasn't enough. There's a v6 to draft.

### 4. The same prompt change that helped two Qwens hurt Gemma.

v5-exemplars dropped Gemma 3-4B's orientation accuracy from 67% → 41%. A 26 pp regression on a metric I wasn't even targeting. Category accuracy on Gemma was flat at 33% (v4: 35%, v5: 33%).

I don't have a tested explanation. The leading hypothesis is that the longer exemplar list pulls Gemma's attention away from the rotation axis — Gemma's image-tower features the rotation cue less prominently than Qwen's, so a more verbose prompt crowds it out. Either way, the lesson is **don't assume a prompt that helps one model family helps another**. If we want a single shipping prompt, we'd benchmark each model individually under it.

### 5. Newer ≠ better, when the runtime hasn't caught up.

I tried adding `Qwen3.5-4B`, `Qwen3.5-9B`, and `Qwen3.6-35B-A3B` (MoE) to the matrix. The HuggingFace conversions exist (Python `mlx-vlm 0.4.4` produces them). All three downloaded fine. All three failed at load with `unsupportedModelType("qwen3_5")` or `("qwen3_5_moe")` — the architectures aren't yet registered in `mlx-swift-examples 2.29.x`, the Swift port we're pinned to.

The Qwen3.5 architecture turns out to be a real lift: hybrid linear/full attention with Mamba-style SSM blocks, a multi-token-prediction head, gated attention output, and an `mrope_interleaved` RoPE variant. Adding it to the Swift port is roughly 800–1500 lines of new code plus numerical-parity tests. Not a one-evening PR. So the right move is wait for an upstream release rather than hand-port the architecture.

## What I'm shipping

**Default cell:** `Qwen3-VL-4B-Instruct-8bit` + `v5-exemplars`. 59% category, 85% orientation, 74% caption keyword recall, 9.1 s/image. The smaller Qwens are 2-3× faster but their category accuracy ceiling is 43% and 9% respectively. Gemma is 30% slower than Qwen3-VL with worse category accuracy.

For users who want speed over category, `Qwen2-VL-2B-Instruct-4bit + v5-exemplars` is a reasonable secondary at 43% / 67% / 3.7 s. Qwen2.5-VL-3B is being removed from the picker.

## What was actually useful about this exercise

Three things, and I think they generalize beyond this app.

**Build the eval before you build the iteration.** I almost shipped Qwen2.5-VL-3B-4bit because it had perfect JSON validity and the smoke test "looks fine, makes valid output." Without a labeled set I would never have noticed that it ignores the image. 56 hand-labeled images, taken once over a Saturday morning, gated four bad shipping decisions over the next week.

**Negative results are cheap signal.** The Qwen3.5/3.6 attempt produced zero data cells. But the failure shape (`unsupportedModelType` after a successful download) told me exactly where the bottleneck is and what would unblock it. That's a takeaway worth committing to the log.

**Confusion matrices are the right diagnostic.** Aggregate accuracy hides everything. "Qwen3-VL is at 40%" means nothing; "Qwen3-VL collapses portrait, travel, group, card, and event into `photo`" tells you what to write next. The day I added per-cell confusion matrices to the auto-generated `report.md`, retroactively all four prior runs became more useful.

## The follow-up loop

I built a small `make eval-search` tool that does seeded random search over a vocabulary of 6 prompt mutators (`drop-exemplar`, `shorten-exemplars`, `reframe-as-cot`, `add-strict-tone`, `swap-rules-order`, `tighten-photo-rule`) on top of the v5 baseline. The idea is to stop hand-rolling v6, v7, v8 and let the harness propose variants — a small Pareto front (category × latency) gets surfaced as a markdown report at the end.

It's pure random for v1; bandits and Bayesian samplers can come later. The point is to make the next "+19 pp" find itself instead of waiting for me to think of it.

Code, prompts, and the EVAL_RESULTS log: [github.com/S-KSM/glimp](https://github.com/S-KSM/glimp).
